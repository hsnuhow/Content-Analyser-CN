{% extends "layout.html" %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <h2 class="mb-4">建立新專案</h2>
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form method="POST" action="{{ url_for('project_bp.create_project') }}">
            <div class="mb-3">
              <label class="form-label fw-semibold">專案名稱 <span class="text-danger">*</span></label>
              <input type="text" name="title" class="form-control" required
                     placeholder="例如：CHANEL 初生光采 × 美白提亮">
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">描述（選填）</label>
              <textarea name="description" class="form-control" rows="3"
                        placeholder="分析目的、品牌、主題..."></textarea>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">建立專案</button>
              <a href="{{ url_for('project_bp.list_projects') }}" class="btn btn-outline-secondary">取消</a>
            </div>
          </form>
        </div>
      </div>
      <p class="text-muted small mt-3">
        💡 建立後請在專案設定中填入 LLM API Key，才能提交分析任務。
      </p>
    </div>
  </div>
</div>
{% endblock %}
